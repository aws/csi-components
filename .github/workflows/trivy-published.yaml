name: Trivy (Published Images)
on:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: read
  security-events: write
  id-token: write
  
jobs:
  trivy-published:
    if: ${{ github.repository == 'aws/csi-components' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@3bd622937f2b34163aaabb7edcded419d2b75fda
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::702945799511:role/github-actions-csi-components
          role-session-name: GithubActionsTrivy

      # ECR Public has a per-IP ratelist for unauthenticated users, which is often hit on
      # GitHub actions due to jobs sharing IPs - this ensures we don't get rate limited
      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@fe725d47d3009d901b44f3df285a6dc9d438e63a
        env:
          AWS_REGION: us-east-1
        with:
          registry-type: public

      - name: Run Trivy (SARIF Output)
        env:
          REGISTRY: public.ecr.aws/csi-components
          OUTPUT_SARIF: 'true'
        run: make all-trivy

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@b0ed4dedcb6dac75e55f599c0ac323404c92645a
        with:
          sarif_file: output/
