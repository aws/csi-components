name: Trivy (Published Images)
on:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: read
  security-events: write
  id-token: write
  
jobs:
  trivy-published:
    if: ${{ github.repository == 'aws/csi-components' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::702945799511:role/github-actions-csi-components
          role-session-name: GithubActionsTrivy

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::797935246662:role/github-actions-csi-components
          role-session-name: GithubActionsTrivy

      # We use the staging repo because it ensures the images are always available (even while a
      # release is ongoing) and we expect it to be bit for bit identical to the published images
      # 
      # This also allows us to easily scan all images in a single place as some images (e.g.
      # the volume-modifier-for-k8s image) are promoted to separate registries
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      - name: Run Trivy (SARIF Output)
        env:
          OUTPUT_SARIF: 'true'
        run: make all-trivy

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: output/
