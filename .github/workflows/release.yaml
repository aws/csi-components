name: Push Staging Images
on:
  push:
    paths:
      - hack/release-config.yaml
    branches:
      - main

permissions:
  contents: read
  id-token: write
  
jobs:
  push-images:
    if: ${{ github.repository == 'aws/csi-components' }}
    runs-on:
      - codebuild-csi-components-e2e-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@3bd622937f2b34163aaabb7edcded419d2b75fda
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::797935246662:role/github-actions-csi-components
          role-session-name: GithubActionsRelease

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@fe725d47d3009d901b44f3df285a6dc9d438e63a

      - name: Set up Go
        uses: actions/setup-go@def8c394e3ad351a79bc93815e4a585520fe993b
        with:
          go-version: '1.26'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@7e10951aea186e886cef2f1a25a7bbf4e593d710

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@7c525be6cc8a882d5163ce04293cac18617c709f

      # yq isn't pre-installed on the CodeBuild runners, so install it here
      - name: Build Images
        run: |
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          make -j `nproc` all-image
