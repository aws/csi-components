name: Push Staging Images
on:
  push:
    paths:
      - hack/release-config.yaml
    branches:
      - main

permissions:
  contents: read
  id-token: write
  
jobs:
  push-images:
    if: ${{ github.repository == 'aws/csi-components' }}
    runs-on:
      - codebuild-csi-components-e2e-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::797935246662:role/github-actions-csi-components
          role-session-name: GithubActionsRelease

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2.1.1

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.26'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # yq isn't pre-installed on the CodeBuild runners, so install it here
      - name: Build Images
        run: |
          wget https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          make -j `nproc` all-image
